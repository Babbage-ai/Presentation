<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cloud Signage Player</title>
    <link rel="stylesheet" href="./player.css">
</head>
<body>
    <div id="app">
        <div id="stage"></div>
        <div id="playlist-banner" class="playlist-banner hidden" aria-hidden="true">
            <div class="playlist-banner-card">
                <div class="playlist-banner-kicker">Current Playlist</div>
                <div class="playlist-banner-label">Loading playlist...</div>
            </div>
        </div>
        <div id="overlay">
            <div id="status">Starting player...</div>
        </div>
    </div>
    <script src="./player.js"></script>
</body>
</html>
